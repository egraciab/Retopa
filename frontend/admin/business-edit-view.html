<div class="card shadow-sm">
  <div class="card-header d-flex justify-content-between align-items-center">
    <span>Editar negocio</span>
    <a href="/admin/layout.html#businesses?page=1" class="btn btn-sm btn-outline-secondary">Volver</a>
  </div>
  <div class="card-body">
    <div id="business-edit-feedback" class="mb-3"></div>
    <form id="business-edit-form">
      <div class="row g-3">
        <div class="col-md-6">
          <label for="edit-name" class="form-label">Nombre</label>
          <input id="edit-name" class="form-control" required />
        </div>
        <div class="col-md-6">
          <label for="edit-phone" class="form-label">Teléfono</label>
          <input id="edit-phone" class="form-control" />
        </div>
        <div class="col-md-6">
          <label for="edit-website" class="form-label">Website</label>
          <input id="edit-website" class="form-control" />
        </div>
        <div class="col-md-3">
          <label for="edit-city-id" class="form-label">Ciudad</label>
          <select id="edit-city-id" class="form-select"></select>
        </div>
        <div class="col-md-3">
          <label for="edit-category-id" class="form-label">Categoría</label>
          <select id="edit-category-id" class="form-select"></select>
        </div>
      </div>
      <div class="mt-3 d-flex gap-2">
        <button id="business-edit-submit" class="btn btn-primary" type="submit">Guardar cambios</button>
        <a href="/admin/layout.html#businesses?page=1" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
