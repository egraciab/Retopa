<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <script src="/admin/js/auth.js"></script>
</head>
<body>
  <h1>Dashboard</h1>

  <div id="content"></div>

  <script>
    async function load() {
      const res = await authFetch('/api/admin/businesses');

      if (!res) return;

      const data = await res.json();

      document.getElementById('content').innerHTML =
        JSON.stringify(data, null, 2);
    }

    load();
  </script>
</body>
</html>
