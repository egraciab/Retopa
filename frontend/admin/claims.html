<!DOCTYPE html>
<html>
<head>
  <title>Claims</title>
  <script src="/admin/js/auth.js"></script>
</head>
<body>
  <h1>Claims</h1>

  <div id="claims"></div>

  <script>
    async function loadClaims() {
      const res = await authFetch('/api/admin/claims');

      if (!res) return;

      const data = await res.json();

      document.getElementById('claims').innerHTML =
        JSON.stringify(data, null, 2);
    }

    loadClaims();
  </script>
</body>
</html>
