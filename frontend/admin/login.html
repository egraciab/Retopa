<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RETOPA Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: linear-gradient(135deg, #1d3557, #457b9d);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.login-box {
  background: white;
  padding: 30px;
  border-radius: 12px;
  width: 350px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.login-box h3 {
  text-align: center;
  margin-bottom: 20px;
}
</style>
</head>

<body>

<div class="login-box">
  <h3>RETOPA Admin</h3>

  <form id="loginForm">
    <input class="form-control mb-3" id="email" placeholder="Email" />
    <input class="form-control mb-3" id="password" type="password" placeholder="Password" />

    <button class="btn btn-primary w-100">Ingresar</button>
  </form>
</div>

<script src="/admin/js/config.js"></script>
<script src="/admin/js/auth.js"></script>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  try {

    const res = await fetch(`${window.RETOPA_API_BASE}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      })
    });

    const json = await res.json();

    console.log("LOGIN RESPONSE:", json);

    if (!json.success) {
      alert('Credenciales inválidas');
      return;
    }

    // 🔥 manejar ambos formatos posibles
    const token = json.token || json.data?.token;

    if (!token) {
      alert('No vino token');
      return;
    }

    // ✅ GUARDAR DIRECTO (SIN auth.js)
    localStorage.setItem('retopa_token', token);

    window.location.href = '/admin/layout.html';

  } catch (err) {
    console.error(err);
    alert('Error en login');
  }
});
</script>
</body>
</html>
