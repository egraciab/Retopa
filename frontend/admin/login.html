<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Retopa Admin Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f4f6f9;
      font-family: Arial, sans-serif;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border: 1px solid #e9ecef;
      border-radius: 10px;
      box-shadow: 0 6px 20px rgba(0,0,0,.08);
      padding: 22px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h4 class="mb-3">RETOPA Admin</h4>
    <form id="login-form">
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input id="email" class="form-control" placeholder="admin@retopa.local" required />
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input id="password" class="form-control" type="password" placeholder="••••••••" required />
      </div>
      <button id="submit-btn" type="submit" class="btn btn-primary w-100">Ingresar</button>
      <p id="error-msg" class="text-danger small mt-3 mb-0 d-none"></p>
    </form>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('error-msg');
    const submitBtn = document.getElementById('submit-btn');

    if (localStorage.getItem('token')) {
      window.location.href = '/admin/layout.html';
    }

    async function login() {
      errorEl.classList.add('d-none');
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      submitBtn.disabled = true;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!data.success) {
          errorEl.textContent = data.message || 'No se pudo iniciar sesión';
          errorEl.classList.remove('d-none');
          return;
        }

        localStorage.setItem('token', data.data.token);
        window.location.href = '/admin/layout.html';
      } catch (err) {
        errorEl.textContent = 'Error de conexión con el servidor.';
        errorEl.classList.remove('d-none');
      } finally {
        submitBtn.disabled = false;
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      await login();
    });
  </script>
</body>
</html>
