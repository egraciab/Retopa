<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RETOPA Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background:#f4f6f9; font-family: Arial, sans-serif; }
    .sidebar {
      width: 230px;
      min-height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      background: #343a40;
      color: #fff;
      padding: 16px;
    }
    .sidebar .brand { font-size: 22px; font-weight: 700; margin-bottom: 16px; }
    .sidebar .nav-link {
      color: #ced4da;
      padding: 10px 12px;
      border-radius: 6px;
      margin-bottom: 6px;
      display: block;
      text-decoration: none;
      cursor: pointer;
    }
    .sidebar .nav-link:hover,
    .sidebar .nav-link.active {
      color: #fff;
      background: #495057;
    }
    .main {
      margin-left: 230px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .topbar {
      background: #fff;
      border-bottom: 1px solid #dee2e6;
      padding: 12px 20px;
      font-weight: 600;
    }
    #content {
      padding: 20px;
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="brand">RETOPA</div>
    <a class="nav-link active" data-page="dashboard" onclick="loadPage('dashboard', this)">Dashboard</a>
    <a class="nav-link" data-page="businesses" onclick="loadPage('businesses', this)">Negocios</a>
    <a class="nav-link" data-page="claims" onclick="loadPage('claims', this)">Claims</a>
    <hr>
    <button class="btn btn-sm btn-danger w-100" onclick="logout()">Salir</button>
  </aside>

  <main class="main">
    <div class="topbar" id="page-title">Dashboard</div>
    <div id="content"></div>
  </main>

  <script src="/admin/js/auth.js"></script>
  <script>
    function setActiveLink(page) {
      document.querySelectorAll('.sidebar .nav-link').forEach((link) => {
        link.classList.toggle('active', link.dataset.page === page);
      });
    }

    async function renderDashboard() {
      const res = await authFetch('/api/admin/businesses');
      if (!res) return;

      const data = await res.json();
      const items = data.data || [];

      const list = document.getElementById('dashboard-businesses');
      const total = document.getElementById('dashboard-total');
      total.textContent = items.length;
      list.innerHTML = items.slice(0, 8).map((b) => `<li class="list-group-item">${b.name}</li>`).join('');
    }

    async function renderBusinesses() {
      const res = await authFetch('/api/admin/businesses');
      if (!res) return;

      const data = await res.json();
      const tbody = document.getElementById('businesses-tbody');
      tbody.innerHTML = '';

      (data.data || []).forEach((b) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${b.id}</td>
          <td>${b.name}</td>
          <td>${b.city || '-'}</td>
          <td>${b.category || '-'}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    async function renderClaims() {
      const res = await authFetch('/api/admin/claims');
      if (!res) return;

      const data = await res.json();
      document.getElementById('claims-json').textContent = JSON.stringify(data, null, 2);
    }

    const pageRenderers = {
      dashboard: renderDashboard,
      businesses: renderBusinesses,
      claims: renderClaims
    };

    async function loadPage(page, linkEl) {
      const res = await fetch(`/admin/${page}.html`);
      if (!res.ok) {
        document.getElementById('content').innerHTML = '<div class="alert alert-danger">No se pudo cargar la página.</div>';
        return;
      }

      const html = await res.text();
      document.getElementById('content').innerHTML = html;
      document.getElementById('page-title').textContent = page.charAt(0).toUpperCase() + page.slice(1);
      setActiveLink(page);
      if (linkEl) linkEl.blur();

      const renderer = pageRenderers[page];
      if (renderer) await renderer();
    }

    function logout() {
      localStorage.removeItem('token');
      window.location.href = '/admin/login.html';
    }

    async function initLayout() {
      const user = await requireSession();
      if (!user) return;
      await loadPage('dashboard');
    }

    initLayout();
  </script>
</body>
</html>
