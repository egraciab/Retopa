<div class="card shadow-sm">
  <div class="card-header d-flex justify-content-between align-items-center">
    <span>Listado de negocios</span>
    <a href="/admin/business-create.html" class="btn btn-sm btn-primary">Nuevo negocio</a>
  </div>
  <div class="card-body border-bottom">
    <div class="row g-2">
      <div class="col-md-6">
        <label for="business-search" class="form-label mb-1">Buscar por nombre</label>
        <input id="business-search" type="text" class="form-control" placeholder="Ej: Ferretería Central" />
      </div>
      <div class="col-md-3">
        <label for="business-city-filter" class="form-label mb-1">Ciudad</label>
        <select id="business-city-filter" class="form-select"></select>
      </div>
      <div class="col-md-3">
        <label for="business-category-filter" class="form-label mb-1">Categoría</label>
        <select id="business-category-filter" class="form-select"></select>
      </div>
    </div>
  </div>
  <div class="table-responsive">
    <table class="table table-striped mb-0">
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Ciudad</th>
          <th>Categoría</th>
          <th class="text-end">Acciones</th>
        </tr>
      </thead>
      <tbody id="businesses-tbody"></tbody>
    </table>
  </div>
  <div class="card-footer d-flex justify-content-between align-items-center">
    <small id="businesses-page-info" class="text-muted">Página 1 de 1</small>
    <div class="d-flex gap-2">
      <button id="businesses-prev" class="btn btn-sm btn-outline-secondary">Anterior</button>
      <button id="businesses-next" class="btn btn-sm btn-outline-secondary">Siguiente</button>
    </div>
  </div>
</div>
